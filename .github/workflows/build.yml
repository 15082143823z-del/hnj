name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL -o tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo tools.zip
          mv cmdline-tools latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install Gradle
        run: |
          curl -sL -o gradle.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -qo gradle.zip -d $HOME
          echo "$HOME/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: /home/runner/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoCrawler-debug
          path: app/build/outputs/apk/debug/app-debug.apk
